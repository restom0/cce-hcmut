sonar.projectKey=restom0_cce-hcmut
sonar.organization=restom0
sonar.projectName=cce-hcmut
sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Third-party code we vendored rather than wrote, archived exercises/demo
# applications, generated assets and binary content. Leaving these in buries
# the maintained CI/deploy surface under old classroom examples, jQuery,
# Bootstrap, DataTables and WordPress plugin findings.
sonar.exclusions=\
  **/bower_components/**,\
  **/node_modules/**,\
  **/vendor/**,\
  **/dist/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/pluto-1.0.0/**,\
  **/polylang/**,\
  **/homework/**,\
  **/Template_BootStrap/**,\
  **/GiaoDien_Front/**,\
  **/ckeditor/**,\
  **/courses/**,\
  **/exercises/**,\
  **/ban_hoa/**,\
  **/assets/dest/**,\
  **/Template/source/**,\
  **/public/backend/**,\
  **/public/admin/**,\
  **/admin/admin/**,\
  PHPNC/project/layout.php,\
  ĐA/project/exercises/buoi-06/admin/**,\
  **/assets/css/bootstrap*.css,\
  **/full-width-slider*/**,\
  **/Dockerfile,\
  **/*.sql,\
  **/*.zip,\
  **/*.rar,\
  **/*.pdf,\
  **/*.pptx,\
  **/*.docx

# Blade templates end in .php, so the PHP analyser picks them up and fails to
# parse @extends / @section. They are templates, not PHP source.
sonar.php.exclusions=**/*.blade.php

# Classify specs as tests rather than production code, so they are not held to
# the same maintainability rules and do not skew the quality gate. Uses
# test.inclusions rather than sonar.tests: sonar.sources is the repo root, and
# naming the same path in both is an analysis error.
sonar.test.inclusions=\
  **/*.spec.ts,\
  **/*.spec.js,\
  **/tests/Feature/**,\
  **/tests/Unit/**

# Coverage is picked up from these paths when they exist. Nothing in CI runs
# the suites yet, so today they are absent and Sonar reports no coverage; the
# paths are declared so that adding `ng test --code-coverage` or phpunit
# --coverage-clover starts feeding the gate without another config change.
sonar.javascript.lcov.reportPaths=\
  JS/project/projectAngular/coverage/lcov.info,\
  JS/project/myproject1/coverage/lcov.info
sonar.php.coverage.reportPaths=\
  Lavarel/project/coverage.xml,\
  ĐA/project/coverage.xml
