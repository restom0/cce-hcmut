sonar.projectKey=restom0_cce-hcmut
sonar.organization=restom0
sonar.projectName=cce-hcmut
sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Third-party code we vendored rather than wrote, plus generated and binary
# content. Leaving these in buries the actual coursework under thousands of
# issues from jQuery, Bootstrap, DataTables and a pile of WordPress plugins.
sonar.exclusions=\
  **/bower_components/**,\
  **/node_modules/**,\
  **/vendor/**,\
  **/dist/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/pluto-1.0.0/**,\
  **/polylang/**,\
  **/homework/**,\
  **/Template_BootStrap/**,\
  **/GiaoDien_Front/**,\
  **/ckeditor/**,\
  **/courses/**,\
  **/*.zip,\
  **/*.rar,\
  **/*.pdf,\
  **/*.pptx,\
  **/*.docx

# Blade templates end in .php, so the PHP analyser picks them up and fails to
# parse @extends / @section. They are templates, not PHP source.
sonar.php.exclusions=**/*.blade.php
