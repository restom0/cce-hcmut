<h2 mat-dialog-title>Thêm mới bài viết</h2>
<mat-dialog-content class="mat-typography">
  <mat-form-field class="example-full-width" appearance="fill">
    <mat-label for="post-title">Title</mat-label>
    <input matInput id="post-title">
  </mat-form-field>

  <mat-form-field class="example-full-width" appearance="fill">
    <mat-label for="post-content">Content</mat-label>
    <textarea matInput id="post-content"></textarea>
  </mat-form-field>

  <mat-form-field class="example-full-width" appearance="fill">
    <mat-label for="post-author">Author name</mat-label>
    <input matInput id="post-author">
  </mat-form-field>

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-button [mat-dialog-close]="true" cdkFocusInitial>Add</button>
</mat-dialog-actions>
