name: Publish images

# Builds a container image for each server application and pushes it to the
# GitHub Container Registry. These are the four apps that need a PHP runtime
# and a database, so they cannot go to Vercel; package-projects.yml publishes
# the same code as source archives, this publishes it as runnable images.

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'Lavarel/project/**'
      - 'ĐA/project/**'
      - 'PHPNC/project/**'
      - 'PHPCB/project/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lavarel
            context: Lavarel/project
          - name: da
            context: ĐA/project
          - name: phpnc
            context: PHPNC/project
          - name: phpcb
            context: PHPCB/project

    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: one that moves with the branch (now "master"), the commit SHA for
      # pinning, and semver on tags.
      - name: Derive tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache in Actions, so composer install is not repeated on
          # every run for the two Laravel images.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
