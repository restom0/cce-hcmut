name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonar:
    name: Quality scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Shallow clones stop Sonar attributing issues to the right commit.
          fetch-depth: 0

      - name: Check Sonar token
        id: creds
        env:
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN is not set; skipping the scan. Create the project on sonarcloud.io and add the token as a repository secret."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # v5 is affected by an argument-injection advisory (Dependabot #385).
      #
      # qualitygate.wait makes the scanner block until SonarCloud has finished
      # computing the gate and exit non-zero if it fails, so a regression turns
      # this job red instead of only showing up on the dashboard. Done with the
      # scanner's own flag rather than a second action: sonarqube-quality-gate-
      # action was last released in 2025 and this repo has already been bitten
      # once by an outdated Sonar action.
      - name: SonarCloud scan and quality gate (attempt 1)
        if: steps.creds.outputs.configured == 'true'
        id: sonar_scan_first
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      # SonarCloud occasionally returns transient 5xx responses while loading
      # project repositories. Retry once so infra blips do not fail the job.
      - name: SonarCloud scan and quality gate (retry once)
        if: steps.creds.outputs.configured == 'true' && steps.sonar_scan_first.outcome == 'failure'
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
